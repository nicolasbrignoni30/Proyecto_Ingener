; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[common]
build_flags =
	-DCORE_DEBUG_LEVEL=3
	-Wall
	-Wextra
	-I include

[libs_can]
lib_deps =
    autowp/autowp-mcp2515 @ ^1.0.3

[libs_modbus]
lib_deps =
    4-20ma/ModbusMaster @ ^2.0.1  ; ModbusMaster by Doc Walker

[libs_mqtt]
lib_deps =
	bblanchon/ArduinoJson@^7.2.2
	knolleary/PubSubClient@^2.8

[libs_display]
lib_deps =
	adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
	adafruit/Adafruit GFX Library@^1.12.6



[env:test_tb]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_src_filter = -<*> +<../test/test_tb/> +<../src/telemetria.cpp>
build_flags = ${common.build_flags}
lib_deps =
    ${libs_mqtt.lib_deps}
    ${libs_display.lib_deps}

[env:test_bms_can_LB]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_src_filter = +<../test/test_bms_can_LB/> +<../src/bms_can.cpp>
#Lo agregue para la funcion que lee la terminal serie
monitor_filters = send_on_enter
build_flags = ${common.build_flags}
lib_deps =
    ${libs_can.lib_deps}

